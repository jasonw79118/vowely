<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Vowely</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .box { border: 1px solid #ddd; border-radius: 12px; padding: 12px; }
    .big { font-size: 28px; font-weight: 800; letter-spacing: 1px; }
    .muted { color: #666; }
    .row { display:flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    input, button, select { font-size: 16px; padding: 10px; }
    #feed { height: 140px; overflow:auto; background:#fafafa; border:1px solid #eee; border-radius: 10px; padding: 8px; }
    #mywords { height: 170px; overflow:auto; background:#fafafa; border:1px solid #eee; border-radius: 10px; padding: 8px; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding: 6px; border-bottom: 1px solid #eee; }
    .pill { display:inline-block; padding: 4px 10px; border:1px solid #ddd; border-radius: 999px; }
      @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      input, button, select { width: 100%; box-sizing: border-box; }
      .row { flex-direction: column; align-items: stretch; }
      body { margin: 12px; }
      .big { font-size: 24px; }
    }
  </style>
</head>
<body>
  <h1>Vowely</h1>

  

  <div id="profileBar" class="box" style="margin-bottom:12px;">
    <div class="row" style="justify-content:space-between; align-items:center;">
      <div><strong>Tier:</strong> <span id="tierValue">—</span></div>
      <div><strong>Rating:</strong> <span id="ratingValue">—</span></div>
      <div><strong>W:</strong> <span id="winsValue">—</span> / <strong>L:</strong> <span id="lossesValue">—</span></div>
      <div class="muted"><strong>Ranked:</strong> <span id="rankedGamesValue">0</span> • <strong>Casual:</strong> <span id="casualGamesValue">0</span></div>
      <div><strong>Last:</strong> <span id="lastResultValue">—</span> <span id="lastDeltaValue"></span></div>
      <div class="muted" style="margin-left:auto;"><strong>Player:</strong> <span id="playerIdValue">—</span></div>
    </div>
  </div>

  <div id="recentWrap" class="box" style="margin-bottom:12px;">
    <div class="row" style="justify-content:space-between; align-items:center;">
      <strong>Recent matches</strong>
      <button id="toggleRecentBtn" type="button">Hide</button>
    </div>
    <div id="recentList" style="margin-top:10px; display:flex; flex-direction:column; gap:6px;"></div>
    <div id="recentEmpty" class="muted" style="margin-top:10px; display:none;">No matches yet.</div>
  </div>

<div class="grid">
    <div class="box">
      <div class="muted">Status</div>
      <div id="status" class="big">CONNECTING…</div>

      <div class="row">
        <input id="name" placeholder="Your name" />
        <button id="setName">Set Name</button>
      </div>

      <div class="row">
        <select id="modeSelect">
          <option value="casual">Casual</option>
          <option value="ranked">Ranked</option>
        </select>
        <button id="play">Play</button>
        <button id="playAgain" type="button">Play Again</button>
        <button id="cancel" disabled>Cancel Search</button>
        <span id="matchPill" class="pill" style="display:none;"></span>
      </div>

      <hr/>

      <div class="muted">Opponent</div>
      <div id="opponent" class="big">—</div>

      <div class="muted">Time left</div>
      <div id="timer" class="big">—</div>

      <div class="muted">Consonants (vowels + Y always allowed)</div>
      <div id="cons" class="big">—</div>

      <hr/>

      <div class="muted">Submit word</div>
      <div class="row">
        <input id="word" placeholder="Type a word…" />
        <button id="submit">Submit</button>
      </div>
      <div id="feedback" class="muted"></div>

      <div class="row">
        <button class="cheer" data-token="gg">GG</button>
        <button class="cheer" data-token="nice">Nice</button>
        <button class="cheer" data-token="clap">👏</button>
        <button class="cheer" data-token="fire">🔥</button>
        <button class="cheer" data-token="party">🎉</button>
      </div>
    </div>

    <div class="box">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
        <h3 style="margin:0;">Leaderboard</h3>
        <button id="refreshLeaderboard" type="button">Refresh</button>
      </div>
      <div id="leaderboardList" style="margin-top:8px; max-height:220px; overflow:auto; border:1px solid #eee; border-radius:10px; background:#fafafa;"></div>

      <hr/>

      <h3>Score</h3>
      <table>
        <thead><tr><th>Player</th><th>Score</th></tr></thead>
        <tbody>
          <tr><td id="aName">—</td><td id="aScore">0</td></tr>
          <tr><td id="bName">—</td><td id="bScore">0</td></tr>
        </tbody>
      </table>

      <hr/>

      <h3>Your accepted words</h3>
      <div id="mywords"></div>

      <hr/>

      <h3>Match feed</h3>
      <div id="feed"></div>
    </div>
  </div>

  <script src="client.js?v=2026-03-05-2"></script>
</body>
</html>
